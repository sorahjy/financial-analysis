<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5f5f7">
  <title>{% block title %}financial-analysis{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/fund-report.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/stock-dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/radar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui-refresh.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <a class="skip-link" href="#app-main">跳到主要内容</a>
  <div class="app-shell">
    <header class="app-topbar">
      <a class="brand" href="{{ url_for('home.index') }}" aria-label="量化工作台首页">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <path d="M7 21.5 12.2 16l4 3.5L25 9.8"/>
            <path d="M7 8.5v15h18"/>
          </svg>
        </span>
        <span class="brand-copy">
          <strong>量化工作台</strong>
          <small>Financial Analysis</small>
        </span>
      </a>
      <nav class="main-nav" aria-label="主导航">
        <a href="{{ url_for('fund.fund_page') }}" data-nav-path="/fund"{% if request.path.startswith('/fund') %} class="is-active" aria-current="page"{% endif %}>
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3.5 15.5V9.8M8 15.5V5.5m4.5 10V8m4 7.5V3.8"/></svg>
          <span>基金报告</span>
        </a>
        <a href="{{ url_for('stock.stock_page') }}" data-nav-path="/stock"{% if request.path.startswith('/stock') %} class="is-active" aria-current="page"{% endif %}>
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m3 13 4-4 3 2.8L16.8 5"/><path d="M12.5 5h4.3v4.3"/></svg>
          <span>A股策略</span>
        </a>
        <a href="{{ url_for('radar.radar_page') }}" data-nav-path="/radar"{% if request.path.startswith('/radar') %} class="is-active" aria-current="page"{% endif %}>
          <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="6.5"/><circle cx="10" cy="10" r="2.5"/><path d="M10 3.5V1.8M16.5 10h1.7M10 16.5v1.7M3.5 10H1.8"/></svg>
          <span>游资雷达</span>
        </a>
      </nav>
    </header>
    <main id="app-main" class="app-main" tabindex="-1">
      {% block content %}{% endblock %}
    </main>
    <div class="sr-only" role="status" aria-live="polite" data-route-announcer></div>
  </div>
  {% block scripts %}{% endblock %}
  <script src="{{ url_for('static', filename='js/fund-report.js') }}"></script>
  <script src="{{ url_for('static', filename='js/stock-dashboard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/radar.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app-navigation.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='vendor/live2d-widget/autoload.js') }}"></script>
</body>
</html>
